# Your display name - shown as the page title and <h1>
title: "Your Name"

# Short bio shown below your name (optional)
bio: "Building things on the internet."

# Path to your profile picture, relative to this file (optional)
avatar: "./images/avatar.png"

theme:
  background: "#f6f1e8" # warm paper-like background
  surface: "#fffaf2"    # soft card/button background
  accent: "#c26d3a"     # earthy terracotta hover/accent
  text: "#2f241f"       # deep brown text
  font: "Oxygen"        # editorial feel
  radius: "16px"        # soft corners
  border: "#d4b99a"     # optional outlines (omit to disable)

# The page is built from rows, stacked top to bottom.
# Each row holds one or more sections displayed as side-by-side columns.
# Sections in the same row share the row's height and split its width equally.

# Section types:
#   links      - a set of link buttons (social, contact, etc.)
#   blog       - posts with title, date, and preview text
#   portfolio  - posts in a grid showing title and subtitle only

# Each blog/portfolio section reads from its own posts_dir.
# You can have as many rows and sections as you want.
# Each section takes equal width by default. Set width: N to control the ratio,
# e.g. width: 2 on one section and width: 1 on another gives a 2:1 split.

# Each row can have its own column_width (optional, defaults to large):
#   xsmall  - 360px
#   small   - 720px
#   medium  - 1100px
#   large   - no limit, just the 10% side margins

rows:
  - column_width: small
    sections:
      - id: "connect"
        type: "links"
        width: 3
        links:
          - label: "GitHub"
            url: "https://github.com/yourname"
            icon: github

          - label: "Twitter / X"
            url: "https://x.com/yourname"
            icon: twitter

          - label: "My Website"
            url: "https://yoursite.com"
            icon: globe

          - label: "LinkedIn"
            url: "https://linkedin.com/in/yourname"
            icon: linkedin

          - label: "Email"
            url: "mailto:you@example.com"
            icon: email

      - id: "projects"
        type: "portfolio"
        title: "Portfolio"
        width: 5
        posts_dir: "./posts/projects"

  - column_width: medium
    sections:
      - id: "blog"
        type: "blog"
        title: "Blog"
        posts_dir: "./posts/writing"
